server {
    listen 8391;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ─── DNS Resolver (untuk proxy ke external domain) ────────
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ─── MIME Types (include default + tambah .mjs) ─────────────
    include /etc/nginx/mime.types;
    types {
        application/javascript mjs;
    }

    # ─── Gzip Compression ──────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ─── SPA Fallback ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Reverse Proxy to Ollama ───────────────────────────────
    location /api/ollama/ {
        proxy_pass http://host.docker.internal:11434/;
        proxy_http_version 1.1;

        proxy_set_header Host localhost:11434;
        proxy_set_header Origin "";
        proxy_set_header Referer "";

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # ─── Reverse Proxy to Qdrant Vector DB ────────────────────
    location /api/vectors/ {
        proxy_pass http://qdrant:6333/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_read_timeout 30s;
    }

    # ─── DuckDuckGo Search Proxy (Real-time) ──────────────────
    location /api/search {
        set $ddg_api api.duckduckgo.com;
        proxy_pass https://$ddg_api/;
        proxy_http_version 1.1;
        proxy_set_header Host api.duckduckgo.com;
        proxy_ssl_server_name on;
        proxy_read_timeout 10s;
    }

    location /api/search/html/ {
        set $ddg_html html.duckduckgo.com;
        proxy_pass https://$ddg_html/html/;
        proxy_http_version 1.1;
        proxy_set_header Host html.duckduckgo.com;
        proxy_ssl_server_name on;
        proxy_read_timeout 10s;
    }

    # ─── RSS News Proxy (Knowledge Sync) ──────────────────────
    location /api/news/detik {
        set $detik rss.detik.com;
        proxy_pass https://$detik/index.php/detikcom;
        proxy_http_version 1.1;
        proxy_set_header Host rss.detik.com;
        proxy_set_header Accept "application/rss+xml, application/xml, text/xml";
        proxy_ssl_server_name on;
        proxy_read_timeout 15s;
    }

    location /api/news/kompas {
        set $kompas rss.kompas.com;
        proxy_pass https://$kompas/kompas;
        proxy_http_version 1.1;
        proxy_set_header Host rss.kompas.com;
        proxy_set_header Accept "application/rss+xml, application/xml, text/xml";
        proxy_ssl_server_name on;
        proxy_read_timeout 15s;
    }

    location /api/news/tempo {
        set $tempo rss.tempo.co;
        proxy_pass https://$tempo/nasional;
        proxy_http_version 1.1;
        proxy_set_header Host rss.tempo.co;
        proxy_set_header Accept "application/rss+xml, application/xml, text/xml";
        proxy_ssl_server_name on;
        proxy_read_timeout 15s;
    }

    location /api/news/bbc {
        set $bbc feeds.bbci.co.uk;
        proxy_pass https://$bbc/indonesia/rss.xml;
        proxy_http_version 1.1;
        proxy_set_header Host feeds.bbci.co.uk;
        proxy_set_header Accept "application/rss+xml, application/xml, text/xml";
        proxy_ssl_server_name on;
        proxy_read_timeout 15s;
    }

    # ─── Wikipedia API Proxy ──────────────────────────────────
    location /api/wiki/featured/ {
        set $wiki id.wikipedia.org;
        proxy_pass https://$wiki/api/rest_v1/feed/featured/;
        proxy_http_version 1.1;
        proxy_set_header Host id.wikipedia.org;
        proxy_set_header Accept "application/json";
        proxy_ssl_server_name on;
        proxy_read_timeout 15s;
    }

    # ─── Static Asset Caching ──────────────────────────────────
    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ─── Security Headers ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
