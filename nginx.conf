server {
    listen 8391;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ─── MIME Types (include default + tambah .mjs) ─────────────
    include /etc/nginx/mime.types;
    types {
        application/javascript mjs;
    }

    # ─── Gzip Compression ──────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ─── SPA Fallback ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Reverse Proxy to Ollama ───────────────────────────────
    location /api/ollama/ {
        proxy_pass http://host.docker.internal:11434/;
        proxy_http_version 1.1;

        # Ollama menolak request dari origin non-localhost
        # Strip Origin & Referer, set Host ke localhost
        proxy_set_header Host localhost:11434;
        proxy_set_header Origin "";
        proxy_set_header Referer "";

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # ─── Static Asset Caching ──────────────────────────────────
    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ─── Security Headers ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
