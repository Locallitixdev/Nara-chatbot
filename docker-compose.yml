# ═══════════════════════════════════════════════════════════════
#  NARA AI Assistant — Docker Compose
#  Ollama sudah berjalan di host, tidak perlu container sendiri
#  Semua port menggunakan non-standard untuk keamanan
# ═══════════════════════════════════════════════════════════════

services:
  # ─── Qdrant Vector Database ────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: nara-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6377}:6333"               # REST API (non-standard host port)
    volumes:
      - qdrant_data:/qdrant/storage               # Persist vector data
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__STORAGE__STORAGE_PATH=/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - nara-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── NARA Frontend (React + Nginx) ─────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_OLLAMA_BASE_URL: /api/ollama
        VITE_DEFAULT_MODEL: ${OLLAMA_MODEL:-llama3.2:1b}
        VITE_OPENCLAW_BASE_URL: ${OPENCLAW_URL:-http://127.0.0.1:9847}
        VITE_OPENCLAW_TOKEN: ${OPENCLAW_TOKEN:-}
        VITE_APP_NAME: ${APP_NAME:-NARA AI Assistant}
        VITE_APP_VERSION: ${APP_VERSION:-1.0.0}
    container_name: nara-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8391}:8391"
    extra_hosts:
      - "host.docker.internal:host-gateway"     # Akses Ollama di host
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - nara-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8391/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# ─── Networks ────────────────────────────────────────────────
networks:
  nara-net:
    driver: bridge
    name: nara-network

# ─── Volumes ─────────────────────────────────────────────────
volumes:
  qdrant_data:
    name: nara-qdrant-data
